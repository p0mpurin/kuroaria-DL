<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>KuroAria DL</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 12px;
        width: 280px;
        font-size: 13px;
        color: #18181b;
      }
      label {
        display: block;
        margin-bottom: 4px;
        font-weight: 500;
      }
      input[type="number"] {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        margin-bottom: 10px;
        border: 1px solid #e4e4e7;
        border-radius: 6px;
      }
      label.row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 400;
        margin-bottom: 10px;
      }
      button {
        width: 100%;
        padding: 8px;
        border: none;
        border-radius: 6px;
        background: #18181b;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #27272a;
      }
      .hint {
        margin-top: 10px;
        font-size: 11px;
        color: #71717a;
        line-height: 1.4;
      }
      .status {
        margin-top: 8px;
        font-size: 12px;
      }
      .ok {
        color: #16a34a;
      }
      .err {
        color: #dc2626;
      }
    </style>
  </head>
  <body>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <img src="logo.png" alt="" width="36" height="36" style="border-radius:8px;object-fit:cover" />
      <strong style="font-size:14px">KuroAria DL</strong>
    </div>
    <label for="port">Bridge port</label>
    <input id="port" type="number" min="1024" max="65535" value="17888" />

    <label class="row">
      <input id="intercept" type="checkbox" />
      Intercept new browser downloads
    </label>

    <button id="sendTab" type="button">Send current tab URL</button>

    <p class="hint">
      Enable <strong>Bridge server</strong> in KuroAria DL Settings first.
    </p>
    <p id="status" class="status"></p>
    <script src="lib/bridge-client.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
